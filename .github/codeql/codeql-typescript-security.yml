name: crabline-codeql-typescript-security

disable-default-queries: true

queries:
  - uses: security-extended

query-filters:
  - include:
      precision: [high, very-high]
      tags contain: security
      security-severity: /([7-9]|10)\.(\d)+/

paths:
  - src
  - tools
  - package.json
  - pnpm-lock.yaml

paths-ignore:
  - "**/node_modules"
  - "**/coverage"
  - "**/dist"
  - "**/*.test.ts"
  - "**/*fixture*"
