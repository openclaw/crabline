name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to publish, for example v0.1.0
        required: true
        type: string

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false
  queue: max

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      commit: ${{ steps.release-commit.outputs.commit }}
      integrity: ${{ steps.package.outputs.integrity }}
      name: ${{ steps.package.outputs.name }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Resolve release tag
        id: release
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          INPUT_TAG: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$GITHUB_REF_TYPE" == "tag" ]]
          [[ "$GITHUB_REF_NAME" == "$tag" ]]
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: refs/tags/${{ steps.release.outputs.tag }}
      - name: Verify checked out release tag
        id: release-commit
        env:
          GITHUB_EVENT_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          release_commit="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"
          [[ "$release_commit" == "$(git rev-parse HEAD)" ]]
          [[ "$release_commit" == "$GITHUB_EVENT_SHA" ]]
          echo "commit=$release_commit" >> "$GITHUB_OUTPUT"
      - name: Verify release metadata
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const version = process.env.RELEASE_VERSION;
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          if (packageJson.version !== version) {
            throw new Error(
              `package.json version ${packageJson.version} does not match release ${version}.`,
            );
          }

          const headingPrefix = `## ${version} - `;
          const headings = fs
            .readFileSync("CHANGELOG.md", "utf8")
            .split(/\r?\n/u)
            .filter((line) => line.startsWith(headingPrefix));
          if (headings.length !== 1 || !/^\d{4}-\d{2}-\d{2}$/u.test(headings[0].slice(headingPrefix.length))) {
            throw new Error(`CHANGELOG.md must contain exactly one "${headingPrefix}YYYY-MM-DD" heading.`);
          }
          NODE
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@12.0.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm verify
      - name: Pack and verify release artifact
        id: package
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          metadata_path="$RUNNER_TEMP/npm-pack.json"
          npm pack --ignore-scripts --json --pack-destination "$RUNNER_TEMP" > "$metadata_path"
          node --input-type=module <<'NODE'
          import { execFileSync } from "node:child_process";
          import fs from "node:fs";
          import path from "node:path";

          const pack = extractPackMetadata(
            fs.readFileSync(`${process.env.RUNNER_TEMP}/npm-pack.json`, "utf8"),
          );
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const cliPath = packageJson.bin?.crabline?.replace(/^\.\//u, "");
          if (!cliPath || !pack.files?.some((file) => file.path === cliPath)) {
            throw new Error(`Packed artifact is missing the crabline CLI at ${cliPath ?? "<unset>"}.`);
          }
          if (!pack.integrity || !pack.filename) {
            throw new Error("npm pack did not report artifact integrity and filename.");
          }
          const tarballPath = path.join(process.env.RUNNER_TEMP, pack.filename);
          const extractionRoot = fs.mkdtempSync(path.join(process.env.RUNNER_TEMP, "crabline-pack-"));
          execFileSync("tar", ["-xzf", tarballPath, "-C", extractionRoot]);
          const packedCliPath = path.join(extractionRoot, "package", cliPath);
          if (!fs.readFileSync(packedCliPath, "utf8").startsWith("#!/usr/bin/env node\n")) {
            throw new Error(`Packed CLI ${cliPath} is missing its Node shebang.`);
          }
          if (pack.version !== process.env.RELEASE_VERSION) {
            throw new Error(
              `Packed version ${pack.version} does not match release ${process.env.RELEASE_VERSION}.`,
            );
          }

          const outputs = {
            integrity: pack.integrity,
            name: packageJson.name,
            tarball: tarballPath,
          };
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            Object.entries(outputs)
              .map(([key, value]) => `${key}=${value}\n`)
              .join(""),
          );

          function extractPackMetadata(output) {
            let pack;
            for (let start = 0; start < output.length; start += 1) {
              if (!isJsonDocumentStart(output, start)) {
                continue;
              }
              const end = findJsonDocumentEnd(output, start);
              if (end === -1) {
                continue;
              }
              try {
                const metadata = JSON.parse(output.slice(start, end));
                const packs = Array.isArray(metadata) ? metadata : Object.values(metadata);
                if (packs.length === 1 && Array.isArray(packs[0]?.files)) {
                  pack = packs[0];
                }
              } catch {
                // Lifecycle output may contain JSON-like text before the metadata document.
              }
              start = end - 1;
            }
            if (!pack) {
              throw new Error("npm pack did not return package metadata.");
            }
            return pack;
          }

          function isJsonDocumentStart(output, index) {
            if (output[index] !== "{" && output[index] !== "[") {
              return false;
            }
            const lineStart = output.lastIndexOf("\n", index - 1) + 1;
            return output.slice(lineStart, index).trim() === "";
          }

          function findJsonDocumentEnd(output, start) {
            const closingTokens = [];
            let escaped = false;
            let inString = false;
            for (let index = start; index < output.length; index += 1) {
              const token = output[index];
              if (inString) {
                if (escaped) {
                  escaped = false;
                } else if (token === "\\") {
                  escaped = true;
                } else if (token === '"') {
                  inString = false;
                }
                continue;
              }
              if (token === '"') {
                inString = true;
              } else if (token === "{") {
                closingTokens.push("}");
              } else if (token === "[") {
                closingTokens.push("]");
              } else if (token === "}" || token === "]") {
                if (closingTokens.pop() !== token) {
                  return -1;
                }
                if (closingTokens.length === 0) {
                  return index + 1;
                }
              }
            }
            return -1;
          }
          NODE
      - name: Upload verified release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          compression-level: 0
          if-no-files-found: error
          name: npm-package
          path: ${{ steps.package.outputs.tarball }}
          retention-days: 1

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@12.0.1
      - name: Download verified release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          name: npm-package
          path: ${{ runner.temp }}/release
      - name: Publish package with npm provenance
        env:
          GITHUB_EVENT_SHA: ${{ github.sha }}
          PACKAGE_INTEGRITY: ${{ needs.verify.outputs.integrity }}
          PACKAGE_NAME: ${{ needs.verify.outputs.name }}
          RELEASE_TAG: ${{ needs.verify.outputs.tag }}
          RELEASE_VERSION: ${{ needs.verify.outputs.version }}
          VERIFIED_COMMIT: ${{ needs.verify.outputs.commit }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=("$RUNNER_TEMP"/release/*.tgz)
          if [[ "${#tarballs[@]}" -ne 1 ]]; then
            echo "::error::Expected one verified npm tarball, found ${#tarballs[@]}."
            exit 1
          fi
          PACKAGE_TARBALL="${tarballs[0]}"

          PACKAGE_TARBALL="$PACKAGE_TARBALL" node --input-type=module <<'NODE'
          import { createHash, timingSafeEqual } from "node:crypto";
          import fs from "node:fs";

          const integrity = process.env.PACKAGE_INTEGRITY;
          const match = /^sha512-([A-Za-z0-9+/]+={0,2})$/u.exec(integrity);
          if (!match) {
            throw new Error(`Expected a sha512 SRI value, got ${integrity}.`);
          }
          const expected = Buffer.from(match[1], "base64");
          const actual = createHash("sha512")
            .update(fs.readFileSync(process.env.PACKAGE_TARBALL))
            .digest();
          if (expected.length !== actual.length || !timingSafeEqual(expected, actual)) {
            throw new Error(`Downloaded npm tarball does not match expected integrity ${integrity}.`);
          }
          NODE

          verify_package_provenance() {
            local audit_dir audit_path
            audit_dir="$(mktemp -d "$RUNNER_TEMP/crabline-provenance.XXXXXX")"
            audit_path="$audit_dir/audit.json"
            if ! (
              cd "$audit_dir"
              npm install --ignore-scripts --no-audit --no-fund "$PACKAGE_NAME@$RELEASE_VERSION" >/dev/null 2>&1
              npm audit signatures --json --include-attestations=true > "$audit_path" 2>/dev/null
            ); then
              rm -rf "$audit_dir"
              return 3
            fi
            if ! PACKAGE_AUDIT_PATH="$audit_path" node --input-type=module 2>/dev/null -e '
            import fs from "node:fs";

            const packageName = process.env.PACKAGE_NAME;
            const releaseVersion = process.env.RELEASE_VERSION;
            const releaseRef = "refs/tags/" + process.env.RELEASE_TAG;
            const repository =
              process.env.GITHUB_SERVER_URL.replace(/\/$/u, "") +
              "/" +
              process.env.GITHUB_REPOSITORY;
            const expectedSubject =
              "pkg:npm/" +
              (packageName.startsWith("@") ? "%40" + packageName.slice(1) : packageName) +
              "@" +
              releaseVersion;
            const integrityMatch = /^sha512-([A-Za-z0-9+/]+={0,2})$/u.exec(
              process.env.PACKAGE_INTEGRITY,
            );
            if (!integrityMatch) {
              process.exit(1);
            }
            const expectedDigest = Buffer.from(integrityMatch[1], "base64").toString("hex");
            const audit = JSON.parse(fs.readFileSync(process.env.PACKAGE_AUDIT_PATH, "utf8"));
            const verified = Array.isArray(audit.verified)
              ? audit.verified.find(
                  (entry) => entry?.name === packageName && entry?.version === releaseVersion,
                )
              : undefined;
            const bundles = Array.isArray(verified?.attestationBundles)
              ? verified.attestationBundles
              : [];
            const valid = bundles.some((attestation) => {
              if (attestation?.predicateType !== "https://slsa.dev/provenance/v1") {
                return false;
              }
              try {
                const statement = JSON.parse(
                  Buffer.from(attestation.bundle.dsseEnvelope.payload, "base64").toString("utf8"),
                );
                const workflow =
                  statement.predicate?.buildDefinition?.externalParameters?.workflow;
                const dependencies =
                  statement.predicate?.buildDefinition?.resolvedDependencies;
                return (
                  statement._type === "https://in-toto.io/Statement/v1" &&
                  statement.predicateType === "https://slsa.dev/provenance/v1" &&
                  statement.predicate?.buildDefinition?.buildType ===
                    "https://slsa-framework.github.io/github-actions-buildtypes/workflow/v1" &&
                  Array.isArray(statement.subject) &&
                  statement.subject.some(
                    (subject) =>
                      subject?.name === expectedSubject &&
                      subject?.digest?.sha512 === expectedDigest,
                  ) &&
                  workflow?.repository === repository &&
                  workflow?.path === ".github/workflows/release.yml" &&
                  workflow?.ref === releaseRef &&
                  Array.isArray(dependencies) &&
                  dependencies.some(
                    (dependency) =>
                      dependency?.uri === "git+" + repository + "@" + releaseRef &&
                      dependency?.digest?.gitCommit === process.env.VERIFIED_COMMIT,
                  )
                );
              } catch {
                return false;
              }
            });
            process.exit(valid ? 0 : 1);
            '; then
              rm -rf "$audit_dir"
              echo "::error::Published $PACKAGE_NAME@$RELEASE_VERSION has provenance that does not match the repository, workflow, tag, commit, or package integrity."
              return 2
            fi
            rm -rf "$audit_dir"
            return 0
          }

          check_existing_package() {
            local actual_integrity actual_version provenance_status
            if ! actual_integrity="$(npm view "$PACKAGE_NAME@$RELEASE_VERSION" dist.integrity 2>/dev/null)"; then
              return 1
            fi
            if ! actual_version="$(npm view "$PACKAGE_NAME@$RELEASE_VERSION" version 2>/dev/null)"; then
              return 1
            fi
            if [[ "$actual_version" != "$RELEASE_VERSION" ]]; then
              echo "::error::Published $PACKAGE_NAME@$RELEASE_VERSION reports version $actual_version."
              return 2
            fi
            if [[ "$actual_integrity" != "$PACKAGE_INTEGRITY" ]]; then
              echo "::error::Published $PACKAGE_NAME@$RELEASE_VERSION has integrity $actual_integrity, expected $PACKAGE_INTEGRITY."
              return 2
            fi
            if verify_package_provenance; then
              return 0
            else
              provenance_status=$?
              return "$provenance_status"
            fi
          }

          verify_published_package() {
            local delay existing_status
            for delay in 2 4 8 16; do
              sleep "$delay"
              if check_existing_package; then
                return 0
              else
                existing_status=$?
                if [[ "$existing_status" -eq 2 ]]; then
                  return 2
                fi
              fi
            done
            return 1
          }

          revalidate_release_tag() {
            local remote_commit remote_refs
            if [[ "$GITHUB_EVENT_SHA" != "$VERIFIED_COMMIT" ]]; then
              echo "::error::Release run commit $GITHUB_EVENT_SHA does not match verified commit $VERIFIED_COMMIT."
              return 1
            fi
            remote_refs="$(
              git ls-remote --exit-code \
                "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git" \
                "refs/tags/$RELEASE_TAG" \
                "refs/tags/$RELEASE_TAG^{}"
            )"
            remote_commit="$(
              awk -v direct="refs/tags/$RELEASE_TAG" -v peeled="refs/tags/$RELEASE_TAG^{}" '
                $2 == peeled { peeled_sha = $1 }
                $2 == direct { direct_sha = $1 }
                END { print (peeled_sha != "" ? peeled_sha : direct_sha) }
              ' <<< "$remote_refs"
            )"
            if [[ -z "$remote_commit" || "$remote_commit" != "$VERIFIED_COMMIT" ]]; then
              echo "::error::Release tag $RELEASE_TAG resolves to ${remote_commit:-<missing>}, expected $VERIFIED_COMMIT."
              return 1
            fi
          }

          guard_latest_version() {
            local latest_version
            if ! latest_version="$(npm view "$PACKAGE_NAME@latest" version 2>/dev/null)"; then
              echo "::error::Unable to resolve the current npm latest version for $PACKAGE_NAME."
              return 1
            fi
            node --input-type=module -e '
              const [release, latest] = process.argv.slice(1);
              const parse = (value) => {
                const match = /^(\d+)\.(\d+)\.(\d+)$/.exec(value);
                if (!match) {
                  throw new Error("Expected a stable semantic version, got " + value + ".");
                }
                return match.slice(1).map(BigInt);
              };
              const releaseParts = parse(release);
              const latestParts = parse(latest);
              for (let index = 0; index < releaseParts.length; index += 1) {
                if (releaseParts[index] > latestParts[index]) process.exit(0);
                if (releaseParts[index] < latestParts[index]) {
                  throw new Error(
                    "Refusing to publish " +
                      release +
                      " because npm latest is newer at " +
                      latest +
                      ".",
                  );
                }
              }
            ' "$RELEASE_VERSION" "$latest_version"
          }

          publish_status=0
          if check_existing_package; then
            publication_message="$PACKAGE_NAME@$RELEASE_VERSION is already published with the expected postconditions."
          else
            existing_status=$?
            if [[ "$existing_status" -eq 2 ]]; then
              exit 1
            fi
            if [[ "$existing_status" -eq 3 ]]; then
              if verify_published_package; then
                revalidate_release_tag
                echo "$PACKAGE_NAME@$RELEASE_VERSION is already published with the expected postconditions."
                exit 0
              else
                verification_status=$?
                if [[ "$verification_status" -eq 2 ]]; then
                  exit 1
                fi
              fi
              echo "::error::Unable to verify existing $PACKAGE_NAME@$RELEASE_VERSION after bounded retries."
              exit 1
            fi

            guard_latest_version
            revalidate_release_tag
            if npm publish "$PACKAGE_TARBALL" --access public --provenance; then
              publication_message="$PACKAGE_NAME@$RELEASE_VERSION was published with npm provenance."
            else
              publish_status=$?
              publication_message="$PACKAGE_NAME@$RELEASE_VERSION was published despite the prior client error."
            fi
          fi

          if verify_published_package; then
            revalidate_release_tag
            echo "$publication_message"
            exit 0
          else
            verification_status=$?
            if [[ "$verification_status" -eq 2 ]]; then
              exit 1
            fi
          fi
          if [[ "$publish_status" -ne 0 ]]; then
            exit "$publish_status"
          fi
          echo "::error::Unable to verify published $PACKAGE_NAME@$RELEASE_VERSION after bounded retries."
          exit 1

  github-release:
    needs: [verify, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_EVENT_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ needs.verify.outputs.tag }}
          VERIFIED_COMMIT: ${{ needs.verify.outputs.commit }}
        run: |
          set -euo pipefail
          revalidate_release_tag() {
            local remote_commit remote_refs
            if [[ "$GITHUB_EVENT_SHA" != "$VERIFIED_COMMIT" ]]; then
              echo "::error::Release run commit $GITHUB_EVENT_SHA does not match verified commit $VERIFIED_COMMIT."
              return 1
            fi
            remote_refs="$(
              git ls-remote --exit-code \
                "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git" \
                "refs/tags/$RELEASE_TAG" \
                "refs/tags/$RELEASE_TAG^{}"
            )"
            remote_commit="$(
              awk -v direct="refs/tags/$RELEASE_TAG" -v peeled="refs/tags/$RELEASE_TAG^{}" '
                $2 == peeled { peeled_sha = $1 }
                $2 == direct { direct_sha = $1 }
                END { print (peeled_sha != "" ? peeled_sha : direct_sha) }
              ' <<< "$remote_refs"
            )"
            if [[ -z "$remote_commit" || "$remote_commit" != "$VERIFIED_COMMIT" ]]; then
              echo "::error::Release tag $RELEASE_TAG resolves to ${remote_commit:-<missing>}, expected $VERIFIED_COMMIT."
              return 1
            fi
          }

          release_error="$RUNNER_TEMP/gh-release-view-error"
          if release_state="$(gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json isDraft,isPrerelease \
            --jq '[.isDraft, .isPrerelease] | @tsv' 2>"$release_error")"; then
            rm -f "$release_error"
            if [[ "$release_state" != $'false\tfalse' ]]; then
              echo "::error::GitHub release $RELEASE_TAG exists but is draft or prerelease."
              exit 1
            fi
            revalidate_release_tag
            echo "GitHub release $RELEASE_TAG already exists."
            exit 0
          else
            view_status=$?
          fi
          view_error="$(cat "$release_error")"
          rm -f "$release_error"
          if [[ "$view_status" -ne 1 || "$view_error" != *"release not found"* ]]; then
            echo "::error::Unable to inspect GitHub release $RELEASE_TAG."
            printf '%s\n' "$view_error" >&2
            exit "$view_status"
          fi
          revalidate_release_tag
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --generate-notes \
            --verify-tag
