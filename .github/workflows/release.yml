name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to publish, for example v0.1.0
        required: true
        type: string

permissions: {}

concurrency:
  group: release-${{ inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      integrity: ${{ steps.package.outputs.integrity }}
      name: ${{ steps.package.outputs.name }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Resolve release tag
        id: release
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          INPUT_TAG: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          if [[ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]]; then
            [[ "$GITHUB_REF_TYPE" == "tag" ]]
            [[ "$GITHUB_REF_NAME" == "$tag" ]]
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: refs/tags/${{ steps.release.outputs.tag }}
      - name: Verify release metadata
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const version = process.env.RELEASE_VERSION;
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          if (packageJson.version !== version) {
            throw new Error(
              `package.json version ${packageJson.version} does not match release ${version}.`,
            );
          }

          const headingPrefix = `## ${version} - `;
          const headings = fs
            .readFileSync("CHANGELOG.md", "utf8")
            .split(/\r?\n/u)
            .filter((line) => line.startsWith(headingPrefix));
          if (headings.length !== 1 || !/^\d{4}-\d{2}-\d{2}$/u.test(headings[0].slice(headingPrefix.length))) {
            throw new Error(`CHANGELOG.md must contain exactly one "${headingPrefix}YYYY-MM-DD" heading.`);
          }
          NODE
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@12.0.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - name: Pack and verify release artifact
        id: package
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          metadata_path="$RUNNER_TEMP/npm-pack.json"
          npm pack --json --pack-destination "$RUNNER_TEMP" > "$metadata_path"
          node --input-type=module <<'NODE'
          import { execFileSync } from "node:child_process";
          import fs from "node:fs";
          import path from "node:path";

          const pack = extractPackMetadata(
            fs.readFileSync(`${process.env.RUNNER_TEMP}/npm-pack.json`, "utf8"),
          );
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const cliPath = packageJson.bin?.crabline?.replace(/^\.\//u, "");
          if (!cliPath || !pack.files?.some((file) => file.path === cliPath)) {
            throw new Error(`Packed artifact is missing the crabline CLI at ${cliPath ?? "<unset>"}.`);
          }
          if (!pack.integrity || !pack.filename) {
            throw new Error("npm pack did not report artifact integrity and filename.");
          }
          const tarballPath = path.join(process.env.RUNNER_TEMP, pack.filename);
          const extractionRoot = fs.mkdtempSync(path.join(process.env.RUNNER_TEMP, "crabline-pack-"));
          execFileSync("tar", ["-xzf", tarballPath, "-C", extractionRoot]);
          const packedCliPath = path.join(extractionRoot, "package", cliPath);
          if (!fs.readFileSync(packedCliPath, "utf8").startsWith("#!/usr/bin/env node\n")) {
            throw new Error(`Packed CLI ${cliPath} is missing its Node shebang.`);
          }
          if (pack.version !== process.env.RELEASE_VERSION) {
            throw new Error(
              `Packed version ${pack.version} does not match release ${process.env.RELEASE_VERSION}.`,
            );
          }

          const outputs = {
            integrity: pack.integrity,
            name: packageJson.name,
            tarball: tarballPath,
          };
          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            Object.entries(outputs)
              .map(([key, value]) => `${key}=${value}\n`)
              .join(""),
          );

          function extractPackMetadata(output) {
            let pack;
            for (let start = 0; start < output.length; start += 1) {
              if (!isJsonDocumentStart(output, start)) {
                continue;
              }
              const end = findJsonDocumentEnd(output, start);
              if (end === -1) {
                continue;
              }
              try {
                const metadata = JSON.parse(output.slice(start, end));
                const packs = Array.isArray(metadata) ? metadata : Object.values(metadata);
                if (packs.length === 1 && Array.isArray(packs[0]?.files)) {
                  pack = packs[0];
                }
              } catch {
                // Lifecycle output may contain JSON-like text before the metadata document.
              }
              start = end - 1;
            }
            if (!pack) {
              throw new Error("npm pack did not return package metadata.");
            }
            return pack;
          }

          function isJsonDocumentStart(output, index) {
            if (output[index] !== "{" && output[index] !== "[") {
              return false;
            }
            const lineStart = output.lastIndexOf("\n", index - 1) + 1;
            return output.slice(lineStart, index).trim() === "";
          }

          function findJsonDocumentEnd(output, start) {
            const closingTokens = [];
            let escaped = false;
            let inString = false;
            for (let index = start; index < output.length; index += 1) {
              const token = output[index];
              if (inString) {
                if (escaped) {
                  escaped = false;
                } else if (token === "\\") {
                  escaped = true;
                } else if (token === '"') {
                  inString = false;
                }
                continue;
              }
              if (token === '"') {
                inString = true;
              } else if (token === "{") {
                closingTokens.push("}");
              } else if (token === "[") {
                closingTokens.push("]");
              } else if (token === "}" || token === "]") {
                if (closingTokens.pop() !== token) {
                  return -1;
                }
                if (closingTokens.length === 0) {
                  return index + 1;
                }
              }
            }
            return -1;
          }
          NODE
      - name: Upload verified release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          compression-level: 0
          if-no-files-found: error
          name: npm-package
          path: ${{ steps.package.outputs.tarball }}
          retention-days: 1

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@12.0.1
      - name: Download verified release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          name: npm-package
          path: ${{ runner.temp }}/release
      - name: Publish package with npm provenance
        env:
          PACKAGE_INTEGRITY: ${{ needs.verify.outputs.integrity }}
          PACKAGE_NAME: ${{ needs.verify.outputs.name }}
          RELEASE_VERSION: ${{ needs.verify.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=("$RUNNER_TEMP"/release/*.tgz)
          if [[ "${#tarballs[@]}" -ne 1 ]]; then
            echo "::error::Expected one verified npm tarball, found ${#tarballs[@]}."
            exit 1
          fi
          PACKAGE_TARBALL="${tarballs[0]}"

          check_existing_package() {
            local actual_integrity
            if ! actual_integrity="$(npm view "$PACKAGE_NAME@$RELEASE_VERSION" dist.integrity 2>/dev/null)"; then
              return 1
            fi
            if [[ "$actual_integrity" != "$PACKAGE_INTEGRITY" ]]; then
              echo "::error::Published $PACKAGE_NAME@$RELEASE_VERSION has integrity $actual_integrity, expected $PACKAGE_INTEGRITY."
              return 2
            fi
            return 0
          }

          if check_existing_package; then
            echo "$PACKAGE_NAME@$RELEASE_VERSION is already published with the expected integrity."
            exit 0
          else
            existing_status=$?
            if [[ "$existing_status" -eq 2 ]]; then
              exit 1
            fi
          fi

          if npm publish "$PACKAGE_TARBALL" --access public --provenance; then
            exit 0
          else
            publish_status=$?
          fi

          for delay in 2 4 8 16; do
            sleep "$delay"
            if check_existing_package; then
              echo "$PACKAGE_NAME@$RELEASE_VERSION was published despite the prior client error."
              exit 0
            else
              existing_status=$?
              if [[ "$existing_status" -eq 2 ]]; then
                exit 1
              fi
            fi
          done
          exit "$publish_status"

  github-release:
    needs: [verify, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.verify.outputs.tag }}
        run: |
          set -euo pipefail
          if release_state="$(gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json isDraft,isPrerelease \
            --jq '[.isDraft, .isPrerelease] | @tsv' 2>/dev/null)"; then
            if [[ "$release_state" != $'false\tfalse' ]]; then
              echo "::error::GitHub release $RELEASE_TAG exists but is draft or prerelease."
              exit 1
            fi
            echo "GitHub release $RELEASE_TAG already exists."
            exit 0
          fi
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --generate-notes \
            --verify-tag
