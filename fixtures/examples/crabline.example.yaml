configVersion: 1
userName: crabline

providers:
  local:
    adapter: loopback
    loopback:
      delayMs: 0

  telegram:
    adapter: telegram
    env:
      - TELEGRAM_BOT_TOKEN
    telegram:
      mode: webhook
      recorder:
        path: ./.crabline/recorders/telegram.jsonl
      webhook:
        host: 127.0.0.1
        port: 8790
        path: /telegram/webhook
        publicUrl: https://example.ngrok.app/telegram/webhook

  whatsapp:
    adapter: whatsapp
    env:
      - WHATSAPP_ACCESS_TOKEN
      - WHATSAPP_APP_SECRET
      - WHATSAPP_PHONE_NUMBER_ID
      - WHATSAPP_VERIFY_TOKEN
    whatsapp:
      recorder:
        path: ./.crabline/recorders/whatsapp.jsonl
      webhook:
        host: 127.0.0.1
        port: 8789
        path: /whatsapp/webhook
        publicUrl: https://example.ngrok.app/whatsapp/webhook

  slack:
    adapter: slack
    env:
      - SLACK_BOT_TOKEN
      - SLACK_SIGNING_SECRET
    slack:
      recorder:
        path: ./.crabline/recorders/slack.jsonl
      webhook:
        host: 127.0.0.1
        port: 8787
        path: /slack/events
        publicUrl: https://example.ngrok.app/slack/events

  slack-openclaw:
    adapter: script
    platform: slack
    env:
      - OPENCLAW_URL
      - OPENCLAW_TOKEN
    script:
      commands:
        probe: node ./scripts/openclaw-slack-probe.mjs
        send: node ./scripts/openclaw-slack-send.mjs
        waitForInbound: node ./scripts/openclaw-slack-wait.mjs

  discord:
    adapter: discord
    env:
      - DISCORD_BOT_TOKEN
    discord:
      recorder:
        path: ./.crabline/recorders/discord.jsonl
      webhook:
        host: 127.0.0.1
        port: 8788
        path: /discord/interactions
        publicUrl: https://example.ngrok.app/discord/interactions

  matrix:
    adapter: matrix
    env:
      - MATRIX_BASE_URL
      - MATRIX_ACCESS_TOKEN
    matrix:
      baseURL: https://matrix.example.com
      recorder:
        path: ./.crabline/recorders/matrix.jsonl

  imessage:
    adapter: imessage
    env:
      - IMESSAGE_SERVER_URL
      - IMESSAGE_API_KEY
    imessage:
      local: false
      serverUrl: https://imessage-gateway.example.com
      recorder:
        path: ./.crabline/recorders/imessage.jsonl

fixtures:
  - id: loopback-roundtrip
    provider: local
    mode: roundtrip
    target:
      id: echo-bot
      behavior: echo

  - id: loopback-agent
    provider: local
    mode: agent
    target:
      id: agent-bot
      behavior: agent

  - id: telegram-dm
    provider: telegram
    mode: roundtrip
    target:
      id: "100000001"
    inboundMatch:
      author: assistant
      strategy: contains
      nonce: contains

  - id: whatsapp-dm
    provider: whatsapp
    mode: roundtrip
    target:
      id: "15551234567"
    inboundMatch:
      author: assistant
      strategy: contains
      nonce: contains

  - id: slack-openclaw-demo
    provider: slack-openclaw
    mode: roundtrip
    env:
      - OPENCLAW_URL
      - OPENCLAW_TOKEN
    target:
      id: C0123456789
      channelId: slack:C0123456789
    inboundMatch:
      author: assistant
      strategy: contains
      nonce: contains

  - id: slack-agent
    provider: slack
    mode: agent
    target:
      id: C0123456789
      channelId: C0123456789
    inboundMatch:
      author: assistant
      strategy: contains
      nonce: contains

  - id: matrix-agent
    provider: matrix
    mode: agent
    target:
      id: "!room:example.com"
      channelId: "!room:example.com"
    inboundMatch:
      author: assistant
      strategy: contains
      nonce: contains

  - id: discord-agent
    provider: discord
    mode: agent
    target:
      id: "123456789012345678"
      metadata:
        guildId: "987654321098765432"
    inboundMatch:
      author: assistant
      strategy: contains
      nonce: contains

  - id: imessage-agent
    provider: imessage
    mode: agent
    target:
      id: chat-guid
    inboundMatch:
      author: assistant
      strategy: contains
      nonce: contains
